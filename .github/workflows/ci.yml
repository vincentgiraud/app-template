name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".github/agents/**"
      - ".github/instructions/**"
      - ".github/prompts/**"
      - ".github/ISSUE_TEMPLATE/**"
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-and-type-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        if: hashFiles('package.json') != ''
        with:
          node-version: "22"

      - uses: actions/setup-python@v5
        if: hashFiles('requirements.txt', 'pyproject.toml') != ''
        with:
          python-version: "3.12"

      - name: Install Node dependencies
        if: hashFiles('package-lock.json') != ''
        run: npm ci --ignore-scripts

      - name: Install Python dependencies
        if: hashFiles('requirements.txt') != ''
        run: pip install -r requirements.txt
      - name: Install Python project
        if: hashFiles('pyproject.toml') != '' && hashFiles('requirements.txt') == ''
        run: pip install -e ".[dev]"

      - name: Lint (Node)
        if: hashFiles('package.json') != ''
        run: npm run lint

      - name: Lint (Python)
        if: hashFiles('pyproject.toml', 'requirements.txt') != ''
        run: |
          pip install ruff 2>/dev/null || true
          if command -v ruff &>/dev/null; then
            ruff check .
          else
            echo "No Python linter configured — skipping"
          fi

      - name: Type check (TypeScript)
        if: hashFiles('tsconfig.json') != ''
        run: npx tsc --noEmit

      - name: Type check (Python)
        if: hashFiles('pyproject.toml', 'requirements.txt') != ''
        run: |
          if command -v mypy &>/dev/null; then
            mypy .
          else
            echo "mypy not installed — skipping Python type check"
          fi

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint-and-type-check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        if: hashFiles('package.json') != ''
        with:
          node-version: "22"

      - uses: actions/setup-python@v5
        if: hashFiles('requirements.txt', 'pyproject.toml') != ''
        with:
          python-version: "3.12"

      - name: Install Node dependencies
        if: hashFiles('package-lock.json') != ''
        run: npm ci --ignore-scripts

      - name: Install Python dependencies
        if: hashFiles('requirements.txt') != ''
        run: pip install -r requirements.txt
      - name: Install Python project
        if: hashFiles('pyproject.toml') != '' && hashFiles('requirements.txt') == ''
        run: pip install -e ".[dev]"

      - name: Test (Node)
        if: hashFiles('package.json') != ''
        run: npm test

      - name: Test (Python)
        if: hashFiles('pyproject.toml', 'requirements.txt') != ''
        run: |
          if command -v pytest &>/dev/null; then
            pytest
          else
            echo "pytest not installed — skipping"
          fi

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        if: hashFiles('package.json') != ''
        with:
          node-version: "22"

      - uses: actions/setup-python@v5
        if: hashFiles('requirements.txt', 'pyproject.toml') != ''
        with:
          python-version: "3.12"

      - name: Install Node dependencies
        if: hashFiles('package-lock.json') != ''
        run: npm ci --ignore-scripts

      - name: Audit Node dependencies
        if: hashFiles('package-lock.json') != ''
        run: npm audit --audit-level=high || true

      - name: Audit Python dependencies
        if: hashFiles('requirements.txt') != ''
        run: |
          pip install pip-audit 2>/dev/null || true
          if command -v pip-audit &>/dev/null; then
            pip-audit -r requirements.txt || true
          fi

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript,python

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-type-check, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        if: hashFiles('package.json') != ''
        with:
          node-version: "22"

      - name: Install Node dependencies
        if: hashFiles('package-lock.json') != ''
        run: npm ci --ignore-scripts

      - name: Build
        if: hashFiles('package.json') != ''
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        if: hashFiles('dist/**') != ''
        with:
          name: build-output
          path: dist/
          retention-days: 7
