name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".github/agents/**"
      - ".github/instructions/**"
      - ".github/prompts/**"
      - ".github/ISSUE_TEMPLATE/**"
  pull_request:
    branches: [main]

permissions:
  contents: read

env:

jobs:
  lint-and-type-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        if: hashFiles('package.json') != ''
        with:
          node-version: "22"

      - uses: actions/setup-python@v5
        if: hashFiles('requirements.txt', 'pyproject.toml') != ''
        with:
          python-version: "3.12"

      - uses: actions/setup-dotnet@v4
        if: hashFiles('*.sln', '*.csproj') != ''
        with:
          dotnet-version: "9.0.x"

      - name: Install Node dependencies
        if: hashFiles('package-lock.json') != ''
        run: npm ci --ignore-scripts

      - name: Install Python dependencies
        if: hashFiles('requirements.txt') != ''
        run: pip install -r requirements.txt
      - name: Install Python project
        if: hashFiles('pyproject.toml') != '' && hashFiles('requirements.txt') == ''
        run: pip install -e ".[dev]"

      - name: Restore .NET dependencies
        if: hashFiles('*.sln', '*.csproj') != ''
        run: dotnet restore

      - name: Lint (Node)
        if: hashFiles('package.json') != ''
        run: npm run lint

      - name: Lint (Python)
        if: hashFiles('pyproject.toml', 'requirements.txt') != ''
        run: |
          pip install ruff 2>/dev/null || true
          if command -v ruff &>/dev/null; then
            ruff check .
          else
            echo "No Python linter configured — skipping"
          fi

      - name: Lint (.NET)
        if: hashFiles('*.sln', '*.csproj') != ''
        run: dotnet format --verify-no-changes || true

      - name: Type check (TypeScript)
        if: hashFiles('tsconfig.json') != ''
        run: npx tsc --noEmit

      - name: Type check (Python)
        if: hashFiles('pyproject.toml', 'requirements.txt') != ''
        run: |
          if command -v mypy &>/dev/null; then
            mypy .
          else
            echo "mypy not installed — skipping Python type check"
          fi

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint-and-type-check
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        if: hashFiles('package.json') != ''
        with:
          node-version: "22"

      - uses: actions/setup-python@v5
        if: hashFiles('requirements.txt', 'pyproject.toml') != ''
        with:
          python-version: "3.12"

      - uses: actions/setup-dotnet@v4
        if: hashFiles('*.sln', '*.csproj') != ''
        with:
          dotnet-version: "9.0.x"

      - name: Install Node dependencies
        if: hashFiles('package-lock.json') != ''
        run: npm ci --ignore-scripts

      - name: Install Python dependencies
        if: hashFiles('requirements.txt') != ''
        run: pip install -r requirements.txt
      - name: Install Python project
        if: hashFiles('pyproject.toml') != '' && hashFiles('requirements.txt') == ''
        run: pip install -e ".[dev]"

      - name: Restore .NET dependencies
        if: hashFiles('*.sln', '*.csproj') != ''
        run: dotnet restore

      - name: Test (Node)
        if: hashFiles('package.json') != ''
        run: npm test

      - name: Test (Python)
        if: hashFiles('pyproject.toml', 'requirements.txt') != ''
        run: |
          if command -v pytest &>/dev/null; then
            pytest
          else
            echo "pytest not installed — skipping"
          fi

      - name: Test (.NET)
        if: hashFiles('*.sln', '*.csproj') != ''
        run: dotnet test --no-restore

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        if: hashFiles('package.json') != ''
        with:
          node-version: "22"

      - uses: actions/setup-python@v5
        if: hashFiles('requirements.txt', 'pyproject.toml') != ''
        with:
          python-version: "3.12"

      - uses: actions/setup-dotnet@v4
        if: hashFiles('*.sln', '*.csproj') != ''
        with:
          dotnet-version: "9.0.x"

      - name: Install Node dependencies
        if: hashFiles('package-lock.json') != ''
        run: npm ci --ignore-scripts

      - name: Audit Node dependencies
        if: hashFiles('package-lock.json') != ''
        run: npm audit --audit-level=high || true

      - name: Audit Python dependencies
        if: hashFiles('requirements.txt') != ''
        run: |
          pip install pip-audit 2>/dev/null || true
          if command -v pip-audit &>/dev/null; then
            pip-audit -r requirements.txt || true
          fi

      - name: Audit .NET dependencies
        if: hashFiles('*.sln', '*.csproj') != ''
        run: dotnet list package --vulnerable --include-transitive || true

      - name: Detect CodeQL languages
        id: codeql-langs
        run: |
          LANGS=""
          # Only add JS/TS if there are actual source files (not just package.json)
          if find . -name '*.js' -o -name '*.ts' -o -name '*.tsx' -o -name '*.jsx' 2>/dev/null | grep -qv node_modules; then
            LANGS="javascript-typescript"
          fi
          if find . -name '*.py' 2>/dev/null | grep -q .; then
            [ -n "$LANGS" ] && LANGS="$LANGS,"
            LANGS="${LANGS}python"
          fi
          if find . -name '*.cs' 2>/dev/null | grep -q .; then
            [ -n "$LANGS" ] && LANGS="$LANGS,"
            LANGS="${LANGS}csharp"
          fi
          echo "languages=$LANGS" >> "$GITHUB_OUTPUT"
          echo "Detected CodeQL languages: ${LANGS:-none}"

      - name: Initialize CodeQL
        if: steps.codeql-langs.outputs.languages != ''
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ steps.codeql-langs.outputs.languages }}

      - name: Perform CodeQL Analysis
        if: steps.codeql-langs.outputs.languages != ''
        uses: github/codeql-action/analyze@v3

      # Deterministic SAST — catches OWASP patterns that AI reviews miss.
      # This addresses the "AI marking its own homework" problem:
      # Semgrep finds vulnerabilities deterministically, not probabilistically.
      - name: Semgrep SAST
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/owasp-top-ten
            p/javascript
            p/typescript
            p/python
            p/csharp
            p/secrets
        env:
          SEMGREP_RULES: p/owasp-top-ten p/secrets
        continue-on-error: true

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-type-check, test]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        if: hashFiles('package.json') != ''
        with:
          node-version: "22"

      - name: Install Node dependencies
        if: hashFiles('package-lock.json') != ''
        run: npm ci --ignore-scripts

      - name: Build
        if: hashFiles('package.json') != ''
        run: npm run build

      - name: Build (.NET)
        if: hashFiles('*.sln', '*.csproj') != ''
        run: dotnet publish --no-restore -c Release -o publish/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        if: hashFiles('dist/**') != ''
        with:
          name: build-output
          path: dist/
          retention-days: 7

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [lint-and-type-check, test, security, build]
    if: always()
    steps:
      - name: Check job results
        run: |
          echo "## Quality Gate Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint & Type Check | ${{ needs.lint-and-type-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Scan | ${{ needs.security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY

          # Fail if any required job failed (security is allowed to soft-fail)
          if [[ "${{ needs.lint-and-type-check.result }}" == "failure" ]]; then
            echo "::error::Lint & Type Check failed"
            exit 1
          fi
          if [[ "${{ needs.test.result }}" == "failure" ]]; then
            echo "::error::Tests failed"
            exit 1
          fi
          if [[ "${{ needs.build.result }}" == "failure" ]]; then
            echo "::error::Build failed"
            exit 1
          fi
          echo "All required quality gates passed."
