name: Deploy to Azure

# Deploy is manual-only until Azure infrastructure is provisioned.
# After running `azd up`, change to trigger on push to main.
on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        if: hashFiles('package.json') != ''
        with:
          node-version: "22"

      - uses: actions/setup-python@v5
        if: hashFiles('requirements.txt', 'pyproject.toml') != ''
        with:
          python-version: "3.12"

      - uses: actions/setup-dotnet@v4
        if: hashFiles('*.sln', '*.csproj') != ''
        with:
          dotnet-version: "9.0.x"

      - name: Install Node dependencies
        if: hashFiles('package-lock.json') != ''
        run: npm ci

      - name: Install Python dependencies
        if: hashFiles('requirements.txt') != ''
        run: pip install -r requirements.txt

      - name: Restore .NET dependencies
        if: hashFiles('*.sln', '*.csproj') != ''
        run: dotnet restore

      - name: Build (Node)
        if: hashFiles('package.json') != ''
        run: npm run build

      - name: Build (.NET)
        if: hashFiles('*.sln', '*.csproj') != ''
        run: dotnet publish -c Release -o publish/

      - name: Install Azure Developer CLI
        uses: Azure/setup-azd@v2

      - name: Log in with Azure (Federated Credentials)
        run: |
          azd auth login `
            --client-id "${{ secrets.AZURE_CLIENT_ID }}" `
            --federated-credential-provider "github" `
            --tenant-id "${{ secrets.AZURE_TENANT_ID }}"
        shell: pwsh

      - name: Deploy to staging
        run: azd deploy --environment staging --no-prompt
        env:
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_ENV_NAME: staging

      - name: Smoke test
        run: |
          STAGING_URL="${{ vars.STAGING_URL }}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$STAGING_URL/health")
          if [ "$STATUS" != "200" ]; then
            echo "Smoke test failed: HTTP $STATUS"
            exit 1
          fi
          echo "Smoke test passed: HTTP $STATUS"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        if: hashFiles('package.json') != ''
        with:
          node-version: "22"

      - uses: actions/setup-python@v5
        if: hashFiles('requirements.txt', 'pyproject.toml') != ''
        with:
          python-version: "3.12"

      - uses: actions/setup-dotnet@v4
        if: hashFiles('*.sln', '*.csproj') != ''
        with:
          dotnet-version: "9.0.x"

      - name: Install Node dependencies
        if: hashFiles('package-lock.json') != ''
        run: npm ci

      - name: Install Python dependencies
        if: hashFiles('requirements.txt') != ''
        run: pip install -r requirements.txt

      - name: Restore .NET dependencies
        if: hashFiles('*.sln', '*.csproj') != ''
        run: dotnet restore

      - name: Build (Node)
        if: hashFiles('package.json') != ''
        run: npm run build

      - name: Build (.NET)
        if: hashFiles('*.sln', '*.csproj') != ''
        run: dotnet publish -c Release -o publish/

      - name: Install Azure Developer CLI
        uses: Azure/setup-azd@v2

      - name: Log in with Azure (Federated Credentials)
        run: |
          azd auth login `
            --client-id "${{ secrets.AZURE_CLIENT_ID }}" `
            --federated-credential-provider "github" `
            --tenant-id "${{ secrets.AZURE_TENANT_ID }}"
        shell: pwsh

      - name: Deploy to production
        run: azd deploy --environment production --no-prompt
        env:
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_ENV_NAME: production
