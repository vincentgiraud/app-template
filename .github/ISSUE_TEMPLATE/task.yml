name: "Implementation Task"
description: "Auto-generated from project task plan or manually created for development work"
title: "[Task]: "
labels: ["task"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What needs to be built or changed.
    validations:
      required: true

  - type: textarea
    id: files
    attributes:
      label: Files / Areas
      description: Which files or directories are affected.
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Frontend
        - Backend / API
        - Infrastructure
        - Shared / Packages
        - Functions
        - Documentation
    validations:
      required: true

  - type: dropdown
    id: complexity
    attributes:
      label: Complexity
      options:
        - S (< 1 hour)
        - M (1-4 hours)
        - L (4+ hours)
    validations:
      required: true

  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: Which tasks must be completed before this one.
      placeholder: "Depends on #12, #13"
    validations:
      required: false
