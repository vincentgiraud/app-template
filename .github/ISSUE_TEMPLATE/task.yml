name: "Implementation Task"
description: "Self-contained task for Copilot agent or human implementation"
title: "[Task]: "
labels: ["task"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What needs to be built or changed, and why.
    validations:
      required: true

  - type: textarea
    id: user-stories
    attributes:
      label: User Stories
      description: Relevant user stories for this task.
      placeholder: "As a [persona], I want to [action], so that [benefit]."
    validations:
      required: false

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: How do we know this task is complete? List testable criteria.
      placeholder: |
        - [ ] User can ...
        - [ ] API returns ...
        - [ ] Tests cover ...
    validations:
      required: true

  - type: textarea
    id: existing-code
    attributes:
      label: Existing Code This Touches
      description: List specific file paths that need modification. Use 'None — greenfield' if nothing exists yet.
      placeholder: |
        - `src/api/routes/users.ts` — add new endpoint
        - `src/components/UserProfile.tsx` — add notifications tab
    validations:
      required: false

  - type: textarea
    id: new-code
    attributes:
      label: New Code to Create
      description: "Be specific: include table fields, endpoint shapes, component props."
      placeholder: |
        - **Database**: new `notifications` table (id, user_id, message, read, created_at)
        - **API endpoints**: GET /api/v1/notifications (paginated list)
        - **UI components**: NotificationBell in src/components/ui/
        - **Tests**: unit tests for notification service
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      multiple: true
      options:
        - Frontend
        - Backend / API
        - Infrastructure
        - Shared / Packages
        - Functions
        - Documentation
        - Testing
        - Security
    validations:
      required: true

  - type: dropdown
    id: complexity
    attributes:
      label: Complexity
      options:
        - S (config, boilerplate, single-file)
        - M (feature, multiple files, some logic)
        - L (complex feature, business logic, edge cases)
        - XL (cross-cutting, refactoring, integration)
    validations:
      required: true

  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: Describe what must exist before this task can start. Dependencies are tracked via GitHub issue relationships, not text references.
      placeholder: "Requires auth endpoints and user table to exist — or 'None — can start immediately'"
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        ### Convention References
        - Follow backend patterns: `.github/instructions/project-backend.instructions.md`
        - Follow frontend patterns: `.github/instructions/project-frontend.instructions.md`
        - Follow architecture: `.github/instructions/project-tech-architecture.instructions.md`
