# Environment setup for GitHub Copilot cloud agent
# This file defines how the cloud agent's development environment is configured
# when it works on issues in this repository.
#
# Docs: https://docs.github.com/en/copilot/how-tos/use-copilot-agents/cloud-agent/configure-dev-environment
#
# Customize these steps based on your project's tech stack.
# The Spec Planner will recommend the right setup when you generate your project.

steps:
  - name: Setup Node.js
    uses: actions/setup-node@v4
    with:
      node-version: "22"

  - name: Setup Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.12"

  - name: Setup .NET
    uses: actions/setup-dotnet@v4
    with:
      dotnet-version: "9.0.x"

  - name: Install Node dependencies
    run: |
      if [ -f pnpm-lock.yaml ] || [ -f pnpm-workspace.yaml ]; then
        corepack enable
        pnpm install
      elif [ -f package-lock.json ]; then
        npm ci
      elif [ -f package.json ]; then
        npm install
      fi

  - name: Install Python dependencies
    run: |
      if [ -f uv.lock ]; then
        curl -LsSf https://astral.sh/uv/install.sh | sh
        uv sync
      elif [ -f requirements.txt ]; then
        pip install -r requirements.txt
      elif [ -f pyproject.toml ]; then
        pip install -e ".[dev]"
      fi

  - name: Install .NET dependencies
    run: |
      if [ -f *.sln ] || [ -f *.csproj ]; then
        dotnet restore
      fi

  - name: Install Azure Developer CLI
    uses: Azure/setup-azd@v2

  - name: Verify tools
    run: |
      node --version
      python3 --version
      dotnet --version
      azd version
